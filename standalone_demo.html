<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>無障礙智慧職缺適配與輔導系統 (極致直覺版)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --accent: #8b5cf6;
      --accent-light: #f5f3ff;
      --success: #10b981;
      --portal-color: #ea580c;
      --portal-light: #ffedd5;
      --ai-color: #7c3aed;
      --ai-light: #f3e8ff;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --border: #cbd5e1;
      --radius: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', 'Outfit', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 40%, #f1f5f9 100%);
      color: var(--text);
      font-size: 19px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 26px;
      font-size: 19px;
      font-weight: 700;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      user-select: none;
      transition: all 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      min-height: 56px;
      text-decoration: none;
    }

    .btn:hover:not(:disabled) { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px rgba(0,0,0,0.12); }
    .btn:active:not(:disabled) { transform: translateY(1px) scale(0.96) !important; }
    .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
    .btn-secondary { background: #ffffff; color: var(--text); border: 2px solid var(--border); }
    .btn-google { background: #ffffff; color: #3c4043; border: 2px solid #dadce0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); font-weight: 800; }

    header {
      background: #ffffff;
      border-bottom: 2px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }
    .header-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .modal-backdrop {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .auth-tab-btn {
      padding: 12px 22px;
      border-radius: 14px;
      font-weight: 900;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    .auth-tab-btn.active {
      background: #2563eb;
      color: white;
      box-shadow: 0 4px 14px rgba(37,99,235,0.3);
    }
    .auth-tab-btn:not(.active) {
      background: #ffffff;
      color: #475569;
      border: 1px solid #cbd5e1;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div style="display: flex; align-items: center; gap: 14px;">
        <div style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; border-radius: 16px;">
          ♿
        </div>
        <div>
          <h1 style="font-size: 23px; font-weight: 900; color: #0f172a;">學生與求職者專用入口</h1>
        </div>
      </div>

      <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
        <button onclick="toggleAuthModal(true)" class="btn btn-primary" style="padding: 8px 18px; min-height: 46px; font-size: 15px;">
          📝 首次登入建檔與自訂密碼
        </button>
        <a href="index.html" class="btn btn-secondary" style="padding: 8px 18px; min-height: 46px; font-size: 15px;">
          🏠 回系統入口 Hub
        </a>
      </div>
    </div>
  </header>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-backdrop">
    <div style="background: white; border-radius: 28px; max-width: 640px; width: 100%; max-height: 94vh; overflow-y: auto; padding: 36px; box-shadow: 0 25px 50px rgba(0,0,0,0.35);">
      
      <div style="text-align: center; margin-bottom: 20px;">
        <div style="width: 64px; height: 64px; border-radius: 20px; background: #eff6ff; color: #2563eb; font-size: 36px; display: inline-flex; align-items: center; justify-content: center; font-weight: 900; margin-bottom: 8px;">
          🔑
        </div>
        <h3 style="font-size: 25px; font-weight: 900; color: #1e40af;">首次登入建檔與自訂密碼</h3>
      </div>

      <div style="display: flex; gap: 8px; justify-content: center; background: #f1f5f9; padding: 8px; border-radius: 18px; margin-bottom: 24px;">
        <button id="tab-reg" onclick="switchTab('reg')" class="auth-tab-btn active">📝 1. 首次建檔與自訂密碼</button>
        <button id="tab-log" onclick="switchTab('log')" class="auth-tab-btn">🔑 2. 已有密碼直接登入</button>
      </div>

      <div id="panel-reg" style="display: block;">
        <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px;">
          <input id="demo-name" type="text" placeholder="您的姓名 (例如: 陳小明)" style="padding: 14px; border-radius: 12px; border: 2px solid #cbd5e1;" />
          <input id="demo-school" type="text" placeholder="學校與科系 (例如: 市立特教職高)" style="padding: 14px; border-radius: 12px; border: 2px solid #cbd5e1;" />
          <input id="demo-email" type="email" placeholder="電子郵件 Email" style="padding: 14px; border-radius: 12px; border: 2px solid #cbd5e1;" />
          
          <div style="background: #fffbeb; border: 2px solid #f59e0b; border-radius: 18px; padding: 18px;">
            <label style="font-size: 17px; font-weight: 900; color: #92400e; display: block; margin-bottom: 6px;">
              🔑 設定您日後登入本系統的自訂密碼 * (必填)
            </label>
            <input id="demo-pass" type="password" placeholder="請在此輸入您自訂的個人登入密碼 (例如: pass123)..." style="width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f59e0b; font-size: 17px; font-weight: 700; background: white;" />
          </div>
        </div>

        <button onclick="saveDemoUser()" class="btn btn-primary" style="width: 100%; min-height: 60px; font-size: 20px;">
          ✅ 完成個人建檔並設定此密碼 ➔
        </button>
      </div>

      <div id="panel-log" style="display: none;">
        <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px;">
          <input id="log-email" type="email" placeholder="Email" style="padding: 14px; border-radius: 12px; border: 2px solid #cbd5e1;" />
          <input id="log-pass" type="password" placeholder="自訂密碼" style="padding: 14px; border-radius: 12px; border: 2px solid #cbd5e1;" />
        </div>
        <button onclick="loginDemoUser()" class="btn btn-primary" style="width: 100%; min-height: 60px; font-size: 20px;">
          🔑 驗證自訂密碼並登入 ➔
        </button>
      </div>

    </div>
  </div>

  <div class="container">
    <div style="background: white; border-radius: 24px; padding: 32px; border: 2px solid #e2e8f0; text-align: center;">
      <h2 style="font-size: 26px; font-weight: 900; color: #1e40af; margin-bottom: 12px;">歡迎來到無障礙智慧職缺適配系統！</h2>
      <p style="font-size: 16px; color: #475569; margin-bottom: 20px;">請點選上方按鈕完成第一次登入與自訂密碼設定。</p>
      <a href="student.html" class="btn btn-primary">進入學生專屬獨立網頁 ➔</a>
    </div>
  </div>

  <script>
    window.onload = function() {
      toggleAuthModal(true);
    };

    function switchTab(t) {
      document.getElementById('panel-reg').style.display = t === 'reg' ? 'block' : 'none';
      document.getElementById('panel-log').style.display = t === 'log' ? 'block' : 'none';
      document.getElementById('tab-reg').className = t === 'reg' ? 'auth-tab-btn active' : 'auth-tab-btn';
      document.getElementById('tab-log').className = t === 'log' ? 'auth-tab-btn active' : 'auth-tab-btn';
    }

    function toggleAuthModal(s) {
      document.getElementById('auth-modal').style.display = s ? 'flex' : 'none';
    }

    function saveDemoUser() {
      const name = document.getElementById('demo-name').value;
      const pass = document.getElementById('demo-pass').value;
      if (!name || !pass) {
        alert('請填寫姓名與自訂密碼！');
        return;
      }
      alert(`🎉 恭喜【${name}】！自訂密碼 [${pass}] 設定成功！`);
      toggleAuthModal(false);
    }

    function loginDemoUser() {
      alert(`🎉 密碼驗證成功！`);
      toggleAuthModal(false);
    }
  </script>
</body>
</html>
